<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BB 몬스터 패턴 에디터</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar">
  <h1>🐾 BB 몬스터 패턴 에디터</h1>
  <div class="mode-switch" role="tablist">
    <button id="mode-web" class="mode-seg" title="배포된 data/ 자동 로드 (읽기 전용 · 편집은 이 브라우저에만)">📦 배포 데이터</button>
    <button id="mode-local" class="mode-seg" title="로컬 폴더를 열어 실제 .json 편집 (소유자/편집자)">💾 로컬 데이터</button>
  </div>
  <span id="mode-actions" class="mode-actions">
    <button id="btn-saveall" class="btn primary" disabled title="편집한 모든 파일을 한 번에 저장 (Ctrl+S)">💾 저장됨</button>
    <button id="btn-open" class="btn" style="display:none">📂 폴더 열기</button>
    <button id="btn-reconnect" class="btn" style="display:none"></button>
    <button id="btn-web-reset" class="btn" style="display:none" title="이 브라우저에 임시 저장한 편집을 모두 지우고 배포 데이터로 되돌림">↺ 로컬 편집 초기화</button>
  </span>
  <span id="root-name" class="root-name"></span>
  <span id="hint" class="hint"></span>
</header>

<div id="app">
  <aside id="sidebar">
    <div class="side-toolbar">
      <div class="tb-group">
        <button id="btn-create" class="btn tb-main" disabled>＋ 데이터 생성</button>
        <div class="tb-flyout" id="create-menu" hidden>
          <button id="btn-newfolder" class="btn mini" title="새 폴더">📁</button>
          <button id="btn-newboss" class="btn mini" title="새 보스">👑</button>
          <button id="btn-newmonster" class="btn mini" title="새 몬스터">👾</button>
          <button id="btn-newuser" class="btn mini" title="새 유저">👤</button>
        </div>
        <button id="btn-del" class="btn mini tb-del" title="선택 삭제" disabled>🗑</button>
      </div>
      <div class="tb-group">
        <button id="btn-userdata" class="btn tb-main">👤 유저 데이터</button>
        <div class="tb-flyout" id="userdata-menu" hidden>
          <button id="btn-user-ai" class="seg" title="AI로 조종">🤖 AI</button>
          <button id="btn-user-manual" class="seg" title="수동 조종 (WASD·마우스·스페이스)">🎮 수동</button>
          <button id="btn-user-edit" class="seg" title="유저 옵션 편집 (폴더 없이 저장)">✎ 편집</button>
          <select id="pb-userdef" class="seg-sel" title="유저 데이터(스펙)"><option value="">기본(하루)</option></select>
        </div>
      </div>
    </div>
    <div id="tree" class="tree"><div class="tree-empty">폴더를 열어주세요</div></div>
  </aside>

  <div class="rsz" id="rsz-side" title="드래그로 크기 조절"></div>

  <main id="inspector" class="inspector">
    <div class="insp-empty">엔티티를 선택하세요</div>
  </main>

  <div class="rsz" id="rsz-stage" title="드래그로 크기 조절"></div>

  <section id="stage">
    <div id="pb-controls" class="pb-controls"></div>
    <div id="pb-canvas-wrap"><canvas id="pb-canvas"></canvas></div>
    <input id="pb-scrub" class="pb-scrub" type="range" min="0" max="1" step="0.01" value="0" disabled>
    <div id="pb-hud" class="pb-hud"></div>
  </section>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
